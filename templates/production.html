<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strata — Production</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#080a0f; --surface:#0f1118; --surface2:#161b26; --surface3:#1c2235;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --accent:#3b82f6; --accent-hi:#60a5fa; --accent-lo:rgba(59,130,246,0.12);
  --accent2:#818cf8; --success:#34d399; --warning:#fbbf24; --danger:#f87171;
  --text:#f1f5f9; --text2:#64748b; --text3:#334155;
  --mono:'Cascadia Code','Fira Mono','Consolas',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --radius:10px; --radius-sm:6px; --t:0.15s ease;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
header{display:flex;align-items:center;padding:0 34px;height:68px;border-bottom:1px solid var(--border);background:rgba(8,10,15,0.95);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:12px;margin-right:40px;text-decoration:none;}
.logo-mark{width:32px;height:32px;flex-shrink:0;}
.logo-mark svg{width:100%;height:100%;}
.logo-name{font-size:1.12rem;font-weight:700;letter-spacing:-0.035em;color:var(--text);}
nav{display:flex;align-items:center;height:100%;gap:2px;}
.nav-link{display:flex;align-items:center;height:100%;padding:0 20px;font-size:0.92rem;font-weight:600;text-decoration:none;color:var(--text2);border-bottom:2px solid transparent;transition:color var(--t),border-color var(--t);}
.nav-link:hover{color:var(--text);}
.nav-link.active{color:var(--accent-hi);border-bottom-color:var(--accent);}
.help-btn{margin-left:auto;width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--t);flex-shrink:0;}
.help-btn:hover{color:var(--text);border-color:var(--border2);background:var(--surface3);}
.app{display:grid;grid-template-columns:300px 1fr;flex:1;min-height:0;overflow:hidden;}
aside{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.ss{padding:16px 20px;border-bottom:1px solid var(--border);}
.ss h3{font-size:0.68rem;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;font-weight:500;}
#dataset-select{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.85rem;font-family:var(--sans);cursor:pointer;}
#dataset-select:focus{outline:none;border-color:var(--accent);}
#prod-terms-container{display:flex;flex-direction:column;gap:8px;}
.term-row{display:flex;gap:8px;align-items:center;}
.term-row input{flex:1;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.88rem;font-family:var(--mono);transition:border-color 0.2s;}
.term-row input::placeholder{color:var(--text3);}
.term-row input:focus{outline:none;border-color:var(--accent);}
.term-row .remove{background:none;border:none;color:var(--text3);font-size:1.1rem;cursor:pointer;padding:4px 8px;border-radius:4px;transition:all 0.15s;}
.term-row .remove:hover{color:var(--danger);background:rgba(248,113,113,0.1);}
.syntax-hint{font-size:0.7rem;font-family:var(--mono);color:var(--text3);line-height:1.9;}
.syntax-hint code{color:var(--accent2);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);border:none;font-size:0.8rem;font-weight:500;font-family:var(--sans);cursor:pointer;transition:all var(--t);white-space:nowrap;}
.btn:disabled{opacity:0.3;cursor:not-allowed;pointer-events:none;}
.btn-primary{background:var(--accent);color:white;}
.btn-primary:hover{background:var(--accent-hi);}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);background:var(--surface3);}
.btn-success{background:var(--success);color:#080a0f;font-weight:600;}
.btn-success:hover{background:#2ed48a;}
main{display:flex;flex-direction:column;overflow:hidden;position:relative;}
.select-bar{display:none;align-items:center;gap:12px;padding:12px 24px;background:rgba(59,130,246,0.06);border-bottom:1px solid rgba(59,130,246,0.2);flex-shrink:0;}
.select-bar.show{display:flex;}
.select-count{font-size:0.83rem;font-family:var(--mono);color:var(--accent);flex:1;}
.results-area{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:12px;}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:10px;padding:60px;}
.empty-state .big-icon{font-size:3rem;opacity:0.35;}
.empty-state p{font-size:0.87rem;font-family:var(--mono);}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color 0.2s;}
.result-card:hover{border-color:var(--text3);}
.result-header{display:flex;align-items:center;gap:12px;padding:13px 17px;cursor:pointer;user-select:none;}
.result-header:hover{background:rgba(255,255,255,0.02);}
.result-term{font-family:var(--mono);font-size:0.88rem;color:var(--accent2);flex:1;}
.badge{font-family:var(--mono);font-size:0.7rem;padding:3px 9px;border-radius:20px;background:var(--accent-lo);color:var(--accent);border:1px solid rgba(59,130,246,0.2);}
.badge.zero{background:var(--surface2);color:var(--text3);border-color:var(--border);}
.chevron{color:var(--text3);font-size:0.72rem;transition:transform 0.2s;}
.chevron.open{transform:rotate(90deg);}
.result-body{display:none;border-top:1px solid var(--border);}
.result-body.open{display:block;}
.select-all-label{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.76rem;color:var(--text2);padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);transition:all 0.15s;user-select:none;}
.select-all-label:hover{color:var(--text);border-color:var(--text3);}
table{width:100%;border-collapse:collapse;font-size:0.8rem;}
th{text-align:left;padding:7px 11px;background:var(--surface2);color:var(--text3);font-weight:500;font-family:var(--mono);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);}
td{padding:8px 11px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text2);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);color:var(--text);}
.doc-name{color:var(--text);font-weight:500;font-size:0.82rem;word-break:break-all;}
.chunks-cell{font-family:var(--mono);font-size:0.73rem;}
.chunk-tag{display:inline-block;background:var(--surface2);color:var(--accent);padding:1px 6px;border-radius:3px;margin:1px 2px;border:1px solid var(--border);font-size:0.7rem;cursor:pointer;transition:all 0.15s;}
.chunk-tag:hover{background:var(--accent-lo);border-color:var(--accent);}
.cb-cell{width:34px;text-align:center;}
.count-cell{width:40px;text-align:center;font-family:var(--mono);color:var(--text3);font-size:0.75rem;}
input[type="checkbox"]{width:14px;height:14px;accent-color:var(--accent);cursor:pointer;}
.no-results{text-align:center;color:var(--text3);padding:18px;font-size:0.83rem;font-family:var(--mono);}
#loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);z-index:300;align-items:center;justify-content:center;}
#loading.show{display:flex;}
.spinner-ring{width:40px;height:40px;border:2.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.65s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.help-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:500;align-items:center;justify-content:center;padding:24px;}
.help-overlay.show{display:flex;}
.help-modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:680px;max-width:100%;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;}
.help-header{display:flex;align-items:center;padding:20px 24px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.help-header h2{font-size:1rem;font-weight:600;letter-spacing:-0.02em;flex:1;}
.help-close{width:28px;height:28px;border-radius:6px;border:none;background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;}
.help-close:hover{background:var(--surface3);color:var(--text);}
.help-tabs{display:flex;gap:2px;padding:12px 24px 0;border-bottom:1px solid var(--border);flex-shrink:0;}
.help-tab{padding:7px 14px;font-size:0.78rem;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:var(--sans);margin-bottom:-1px;}
.help-tab:hover{color:var(--text);}
.help-tab.active{color:var(--accent-hi);border-bottom-color:var(--accent);}
.help-body{flex:1;overflow-y:auto;padding:24px;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent;}
.help-panel{display:none;}
.help-panel.active{display:block;}
.help-section{margin-bottom:22px;}
.help-section h3{font-size:0.8rem;font-weight:600;color:var(--accent-hi);margin-bottom:8px;}
.help-section p{font-size:0.82rem;color:var(--text2);line-height:1.7;margin-bottom:8px;}
.help-steps{display:flex;flex-direction:column;gap:8px;}
.help-step{display:flex;gap:12px;align-items:flex-start;}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--accent-lo);border:1px solid rgba(59,130,246,0.25);color:var(--accent-hi);font-size:0.68rem;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.step-text{font-size:0.82rem;color:var(--text2);line-height:1.6;}
.step-text strong{color:var(--text);font-weight:500;}
.help-code{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 7px;font-family:var(--mono);font-size:0.75rem;color:var(--accent2);}
.help-tip{background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.15);border-radius:var(--radius-sm);padding:10px 14px;font-size:0.78rem;color:var(--text2);line-height:1.6;margin-top:12px;}
.help-tip strong{color:var(--accent-hi);}
</style>
</head>
<body>
<header>
  <a href="/" class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 26 26" fill="none"><rect x="3" y="5" width="20" height="4" rx="2" fill="#3b82f6"/><rect x="3" y="11" width="20" height="4" rx="2" fill="#3b82f6" opacity="0.6"/><rect x="3" y="17" width="20" height="4" rx="2" fill="#3b82f6" opacity="0.3"/></svg>
    </div>
    <span class="logo-name">Strata</span>
  </a>
  <nav>
    <a href="/" class="nav-link">Index</a>
    <a href="/production" class="nav-link active">Production</a>
    <a href="/redactions" class="nav-link">Redactions</a>
  </nav>
  <button class="help-btn" onclick="toggleHelp()" title="How to use Strata">
    <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="3" y="1" width="10" height="13" rx="2" stroke="currentColor" stroke-width="1.3"/><line x1="5.5" y1="5" x2="10.5" y2="5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="5.5" y1="7.5" x2="10.5" y2="7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="5.5" y1="10" x2="8.5" y2="10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
  </button>
</header>

<div class="app">
  <aside>
    <div class="ss"><h3>Dataset</h3>
      <select id="dataset-select" onchange="onDatasetChange()">
        <option value="">— Select an indexed dataset —</option>
      </select>
    </div>
    <div class="ss"><h3>Search Terms</h3>
      <div id="prod-terms-container"></div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button class="btn btn-ghost" style="flex:1;font-size:0.78rem;" onclick="prodAddTerm()">+ Add term</button>
        <button class="btn btn-ghost" style="font-size:0.78rem;" onclick="clearProdTerms()">Clear</button>
      </div>
    </div>
    <div class="ss">
      <button class="btn btn-primary" id="prod-search-btn" onclick="doProdSearch()" disabled style="width:100%">⌕ Search</button>
    </div>
    <div class="ss"><h3>Syntax</h3>
      <div class="syntax-hint">
        <code>AND</code> &nbsp;<code>OR</code> &nbsp;<code>NOT</code><br>
        <code>"exact phrase"</code><br>
        <code>run*</code> wildcard<br>
        <code>~fuzzy</code><br>
        <code>"a" W/10 "b"</code> proximity
      </div>
    </div>
  </aside>
  <main>
    <div class="select-bar" id="select-bar">
      <span class="select-count" id="select-count">0 documents selected</span>
      <button class="btn btn-ghost" style="font-size:0.8rem" onclick="selectAll()">Select all</button>
      <button class="btn btn-ghost" style="font-size:0.8rem" onclick="clearSelection()">Clear selection</button>
      <button class="btn btn-success" onclick="doExportZip()">⬇ Export ZIP</button>
    </div>
    <div class="results-area" id="results-area">
      <div class="empty-state" id="prod-empty">
        <div class="big-icon">📦</div>
        <p>Select a dataset, enter search terms, and click Search</p>
      </div>
      <div id="prod-results"></div>
    </div>
  </main>
</div>
<div id="loading"><div class="spinner-ring"></div></div>

<script>
let prodDataset="",prodResults={},selectedDocs={};

function init(){
  prodAddTerm();
  fetch("/datasets").then(r=>r.json()).then(datasets=>{
    const sel=document.getElementById("dataset-select");
    const indexed=datasets.filter(ds=>ds.indexed);
    if(!indexed.length){sel.innerHTML='<option value="">— No indexed datasets found —</option>';return;}
    sel.innerHTML='<option value="">— Select a production —</option>';
    indexed.forEach(ds=>{const o=document.createElement("option");o.value=ds.name;o.textContent=ds.name+" ("+ds.files+" file"+(ds.files!==1?"s":"")+")";sel.appendChild(o);});
  }).catch(()=>{});
}

function onDatasetChange(){
  prodDataset=document.getElementById("dataset-select").value;
  document.getElementById("prod-search-btn").disabled=!prodDataset;
  clearProdResults();
}

function prodAddTerm(v){
  const row=document.createElement("div");row.className="term-row";
  row.innerHTML=`<input type="text" placeholder='e.g. "contract" AND NOT cancelled' value="${esc(v||"")}" onkeydown="if(event.key==='Enter') doProdSearch()"><button class="remove" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById("prod-terms-container").appendChild(row);
  row.querySelector("input").focus();
}

function getProdTerms(){return[...document.querySelectorAll("#prod-terms-container .term-row input")].map(i=>i.value.trim()).filter(Boolean);}

function clearProdTerms(){document.getElementById("prod-terms-container").innerHTML="";clearProdResults();prodAddTerm();}

async function doProdSearch(){
  const terms=getProdTerms();
  if(!terms.length||!prodDataset)return;
  document.getElementById("loading").classList.add("show");
  try{
    const resp=await fetch("/production/search",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({dataset:prodDataset,terms})});
    const data=await resp.json();
    if(data.error){alert("Search error: "+data.error);return;}
    prodResults=data.results;selectedDocs={};updateSelectBar();renderProdResults(data.results);
  }catch(e){alert("Search failed: "+e);}
  finally{document.getElementById("loading").classList.remove("show");}
}

function renderProdResults(results){
  const container=document.getElementById("prod-results");
  const empty=document.getElementById("prod-empty");
  container.innerHTML="";
  const terms=Object.keys(results);
  if(!terms.length){empty.style.display="flex";return;}
  empty.style.display="none";
  terms.forEach(term=>{
    const r=results[term],docs=r.docs||[];
    const card=document.createElement("div");card.className="result-card";
    let rows=docs.length?docs.map(d=>`<tr>
      <td class="cb-cell"><input type="checkbox" class="doc-checkbox" data-doc="${esc(d.name)}" data-term="${esc(term)}" onchange="onDocCheck(this)"></td>
      <td class="doc-name">${esc(d.name)}</td>
      <td class="chunks-cell">${d.chunks.map(c=>{const pn=c.match(/^p(\d+)(?:\D|$)/)?.[1];const url=`/preview/${encodeURIComponent(prodDataset)}/${d.name.replace(/\\/g,'/').split('/').map(encodeURIComponent).join('/')}${pn?'?page='+pn:''}`;return`<a class="chunk-tag" href="${url}" target="_blank" rel="noopener" title="Open ${esc(d.name)} at ${esc(c)}">${esc(c)}</a>`;}).join("")}</td>
      <td class="count-cell">${d.chunks.length}</td>
    </tr>`).join(""):`<tr><td colspan="4" class="no-results">No matching documents</td></tr>`;
    card.innerHTML=`
      <div class="result-header" onclick="toggleCard(this)">
        <span class="result-term">${esc(term)}</span>
        <span class="badge ${docs.length===0?'zero':''}">${docs.length} doc${docs.length!==1?'s':''}</span>
        ${docs.length>0?`<label class="select-all-label" onclick="event.stopPropagation()"><input type="checkbox" class="term-select-all" data-term="${esc(term)}" onclick="event.stopPropagation()" onchange="toggleTermAll(this)"> Select all</label>`:""}
        <span class="chevron">▶</span>
      </div>
      <div class="result-body">
        <table><thead><tr><th class="cb-cell"></th><th>Document</th><th>Matching pages / chunks</th><th class="count-cell">#</th></tr></thead><tbody>${rows}</tbody></table>
      </div>`;
    container.appendChild(card);
  });
}

function toggleCard(h){const b=h.nextElementSibling,c=h.querySelector(".chevron");b.classList.toggle("open");c.classList.toggle("open",b.classList.contains("open"));}

function onDocCheck(cb){
  const dn=cb.dataset.doc,term=cb.dataset.term,doc=(prodResults[term]?.docs||[]).find(d=>d.name===dn);
  if(cb.checked){
    if(!selectedDocs[dn])selectedDocs[dn]={terms:new Set(),chunks:new Set()};
    selectedDocs[dn].terms.add(term);(doc?.chunks||[]).forEach(c=>selectedDocs[dn].chunks.add(c));
  }else if(selectedDocs[dn]){
    selectedDocs[dn].terms.delete(term);selectedDocs[dn].chunks=new Set();
    selectedDocs[dn].terms.forEach(t=>{const d2=(prodResults[t]?.docs||[]).find(d=>d.name===dn);(d2?.chunks||[]).forEach(c=>selectedDocs[dn].chunks.add(c));});
    if(selectedDocs[dn].terms.size===0)delete selectedDocs[dn];
  }
  syncTermSelectAll(term);updateSelectBar();
}

function syncTermSelectAll(term){
  const cbs=[...document.querySelectorAll(`.doc-checkbox[data-term="${CSS.escape(term)}"]`)];
  const m=document.querySelector(`.term-select-all[data-term="${CSS.escape(term)}"]`);
  if(!m||!cbs.length)return;
  const n=cbs.filter(c=>c.checked).length;m.checked=n===cbs.length;m.indeterminate=n>0&&n<cbs.length;
}

function toggleTermAll(m){
  const term=m.dataset.term;
  document.querySelectorAll(`.doc-checkbox[data-term="${CSS.escape(term)}"]`).forEach(cb=>{
    cb.checked=m.checked;const dn=cb.dataset.doc;
    if(m.checked){
      const doc=(prodResults[term]?.docs||[]).find(d=>d.name===dn);
      if(!selectedDocs[dn])selectedDocs[dn]={terms:new Set(),chunks:new Set()};
      selectedDocs[dn].terms.add(term);(doc?.chunks||[]).forEach(c=>selectedDocs[dn].chunks.add(c));
    }else if(selectedDocs[dn]){
      selectedDocs[dn].terms.delete(term);selectedDocs[dn].chunks=new Set();
      selectedDocs[dn].terms.forEach(t=>{const d2=(prodResults[t]?.docs||[]).find(d=>d.name===dn);(d2?.chunks||[]).forEach(c=>selectedDocs[dn].chunks.add(c));});
      if(selectedDocs[dn].terms.size===0)delete selectedDocs[dn];
    }
  });
  syncTermSelectAll(term);updateSelectBar();
  if(m.checked){const h=m.closest('.result-header'),b=h&&h.nextElementSibling;if(b&&!b.classList.contains('open')){b.classList.add('open');const ch=h.querySelector('.chevron');if(ch)ch.classList.add('open');}}
}

function selectAll(){
  document.querySelectorAll(".doc-checkbox").forEach(cb=>{
    cb.checked=true;const dn=cb.dataset.doc,term=cb.dataset.term,doc=(prodResults[term]?.docs||[]).find(d=>d.name===dn);
    if(!selectedDocs[dn])selectedDocs[dn]={terms:new Set(),chunks:new Set()};
    selectedDocs[dn].terms.add(term);(doc?.chunks||[]).forEach(c=>selectedDocs[dn].chunks.add(c));
  });
  document.querySelectorAll(".term-select-all").forEach(cb=>{cb.checked=true;cb.indeterminate=false;});
  updateSelectBar();
}

function clearSelection(){
  document.querySelectorAll(".doc-checkbox").forEach(cb=>{if(cb.checked){cb.checked=false;onDocCheck(cb);}});
  document.querySelectorAll(".term-select-all").forEach(cb=>{cb.checked=false;cb.indeterminate=false;});
  selectedDocs={};updateSelectBar();
}

function updateSelectBar(){
  const n=Object.keys(selectedDocs).length;
  document.getElementById("select-count").textContent=n+" document"+(n!==1?"s":"")+" selected";
  document.getElementById("select-bar").classList.toggle("show",n>0);
}

function clearProdResults(){document.getElementById("prod-results").innerHTML="";document.getElementById("prod-empty").style.display="flex";selectedDocs={};prodResults={};updateSelectBar();}

async function doExportZip(){
  const n=Object.keys(selectedDocs).length;if(!n)return;
  const selections=Object.entries(selectedDocs).map(([name,data])=>({name,terms:[...data.terms],chunks:[...data.chunks].sort()}));
  document.getElementById("loading").classList.add("show");
  try{
    const resp=await fetch("/production/export_zip",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({dataset:prodDataset,selections})});
    if(!resp.ok){const e=await resp.json().catch(()=>({error:resp.statusText}));throw new Error(e.error||resp.statusText);}
    const blob=await resp.blob();const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="production_export.zip";a.click();setTimeout(()=>URL.revokeObjectURL(a.href),5000);
  }catch(e){alert("Export error: "+e.message);}
  finally{document.getElementById("loading").classList.remove("show");}
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function toggleHelp(){document.getElementById('help-overlay').classList.toggle('show');}
function switchHelpTab(tab){
  document.querySelectorAll('.help-tab').forEach((t,i)=>t.classList.toggle('active',['index','production','redactions','syntax'][i]===tab));
  document.querySelectorAll('.help-panel').forEach(p=>p.classList.toggle('active',p.id==='help-'+tab));
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('help-overlay').classList.remove('show');});
init();
</script>
