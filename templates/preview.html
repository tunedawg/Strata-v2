<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strata Preview</title>
<style>
html,body{height:100%;margin:0;background:#080a0f;color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
.bar{height:42px;display:flex;align-items:center;gap:12px;padding:0 14px;background:#0f1118;border-bottom:1px solid rgba(255,255,255,0.08);font-size:13px;}
.name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.page{font-family:'Cascadia Code',Consolas,monospace;color:#60a5fa;margin-left:auto;}
iframe{display:block;width:100%;height:calc(100% - 43px);border:0;background:#111827;}
a{color:#60a5fa;text-decoration:none;}
</style>
</head>
<body>
<div class="bar">
  <span class="name">{{ relative_name }}</span>
  {% if page %}<span class="page">page {{ page }}</span>{% endif %}
  <a href="/preview_file/{{ dataset }}/{{ preview_path }}{% if page %}#page={{ page }}{% endif %}" target="_blank" rel="noopener">open raw</a>
</div>
<iframe src="/preview_file/{{ dataset }}/{{ preview_path }}{% if page %}#page={{ page }}{% endif %}"></iframe>
</body>
</html>
